name: fcs_app
description: FemTech & Child Safety — Flutter app (pregnancy health + child safety).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"
  flutter: ">=3.27.0"           # Color.withValues used in the emergency screen

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:          # ru / kk / en Material+Cupertino localizations
    sdk: flutter
  intl: any
  flutter_blue_plus: ^1.32.0      # BLE band + beacon
  geolocator: ^12.0.0            # GPS/location fixes
  sensors_plus: ^6.0.0          # accelerometer → AdaptiveScanController
  connectivity_plus: ^6.0.0     # flush batcher on reconnect
  flutter_local_notifications: ^17.2.3   # on-device alerts (geofence enter/exit)
  timezone: ^0.9.4              # tz-aware scheduling for reminder notifications
  # firebase_messaging: ^15.0.0   # FCM/APNS push
  url_launcher: ^6.3.0          # tel: dialer for the emergency call button
  http: ^1.2.0                  # backend API transport
  google_maps_flutter: ^2.9.0   # child tracking map + geofence overlays
  shared_preferences: ^2.3.0    # persist onboarding/session config
  image_picker: ^1.1.0          # pick profile / child photos from gallery or camera
  path_provider: ^2.1.0         # app documents dir to store picked photos
  flutter_timezone: ^5.1.0
  video_player: ^2.13.0
  share_plus: ^13.2.1
  record: ^5.1.2                # short mic recording for cry analysis
  # mmkv: ^2.0.0                  # fast disk mirror for offline-first batcher

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.25.0
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    # Authored timeline content. Edit this file to publish real lessons and
    # products; the app falls back to the seeded catalogue if it is absent.
    - assets/content/catalog.json
    # Week-by-week pregnancy calendar (ru + kk). A copy of the shared contract
    # packages/contract/pregnancy_weeks.json; kept in sync by
    # tool/verify_pregnancy_weeks_contract.dart.
    - assets/data/pregnancy_weeks.json
    # Week-by-week baby-development calendar (ru + kk). A copy of the shared
    # contract packages/contract/baby_development.json; kept in sync by
    # tool/verify_baby_development_contract.dart.
    - assets/data/baby_development.json
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
