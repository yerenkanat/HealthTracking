name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dart-logic:
    name: Dart pure-logic verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      # The verify_* scripts have no package: imports, so they run without pub get.
      # verify_all discovers every runner, so adding one needs no CI change.
      - name: Verify all pure-Dart domain logic
        run: dart run tool/verify_all.dart
        working-directory: app

  flutter-tests:
    name: Flutter widget + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
        working-directory: app
      - run: flutter analyze
        working-directory: app
      - run: flutter test
        working-directory: app

  backend:
    name: Backend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      # The job has always been named "typecheck + tests" but only ran the
      # tests, so type errors reached main unnoticed — including a push payload
      # that could not have worked.
      - run: npm run typecheck
      - run: npm test

  cry-classifier:
    name: Cry classifier (smoke tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      # ffmpeg/libsndfile for pydub + soundfile, same as the Docker image.
      - run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg libsndfile1
      - run: pip install -r requirements.txt pytest
        working-directory: packages/cry-classifier
      # Smoke tests only — no dataset or trained model needed. They pin the
      # feature-extraction invariants (fixed vector length, determinism) that the
      # train/serve contract depends on.
      - run: pytest -q
        working-directory: packages/cry-classifier
